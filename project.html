    <!-- Header Section -->
    <header class="site-header">
        <div class="header-content">
            <h1 class="head">EVENT  PLANNER</h1>
           <div class= "header-action">
             <button id="calendar-btn" class="icon-btn-cal"><i class="fas fa-calendar-alt"></i>   Check Availability</button>
             <button id="cart-btn" class="icon-btn"><i class="fas fa-shopping-cart"></i> Add to Cart</button>

           </div>

        </div>

</div>

        <button id="checkout-btn" class="add-to-cart-btn">Checkout</button>
    </div>
</div>
