        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Tab Content - Only Decoration now */
        .tab-content {
            display: block; /* Always visible since only one tab */
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.8); /* Semi-transparent black for overlay */
            border-radius: 10px;
            font-family: 'Times New Roman', Times, serif;
        }

        .tab-content h2 {
            color: #ffd700;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
        }

        /* Dropdowns in decoration tab */
        .dropdown {
            background-color: #555; /* Grey */
            color: #ffd700;
            border: 1px solid #ffd700;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 300px;
        }

        /* Gallery */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            max-height: 600px; /* Limit height for scrollbar */
            overflow-y: auto; /* Scrollbar */
            padding-right: 10px; /* Space for scrollbar */
        }

        .gallery-item {
            background-color: #333;
            border: 1px solid #ffd700;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            width: calc(33% - 20px); /* 3 items per row, adjust as needed */
            box-sizing: border-box;
            display: flex;
            flex-direction: column; /* Stack vertically */
            align-items: center;
            transition: transform 0.3s;
        }

        .gallery-item:hover {
            transform: scale(1.05); /* Slight zoom on hover */
        }

        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 10px; /* Space below image */
        }

        .gallery-item p {
            margin: 0 0 10px 0; /* Description and price below image, above button */
            color: #ffd700;
            font-weight: bold;
            font-size: 0.9em;
        }

        /* Add to Cart Button */

            background-color: #ffd700; /* Gold/yellow */

            font-weight: bold;

        }

// Dropdowns
const categoryDropdown = document.getElementById('category-dropdown');
const subcategoryDropdown = document.getElementById('subcategory-dropdown');
const typeDropdown = document.getElementById('type-dropdown');
const gallery = document.getElementById('gallery');

// Category change
categoryDropdown.addEventListener('change', () => {
    const category = categoryDropdown.value;
    subcategoryDropdown.innerHTML = '<option value="">Select a Sub-Category</option>';
    typeDropdown.style.display = 'none';
    gallery.innerHTML = '';
    if (category) {
        const subcategories = Object.keys(eventData[category]);
        subcategories.forEach(sub => {
            const option = document.createElement('option');
            option.value = sub;
            option.textContent = sub.charAt(0).toUpperCase() + sub.slice(1).replace('-', ' ');
            subcategoryDropdown.appendChild(option);
        });
        subcategoryDropdown.style.display = 'block';
    } else {
        subcategoryDropdown.style.display = 'none';
    }
});

// Subcategory change
subcategoryDropdown.addEventListener('change', () => {
    const category = categoryDropdown.value;
    const subcategory = subcategoryDropdown.value;
    typeDropdown.innerHTML = '<option value="">Select a Type</option>';
    gallery.innerHTML = '';
    if (subcategory && eventData[category][subcategory]) {
        const types = Object.keys(eventData[category][subcategory]);
        types.forEach(type => {
            const option = document.createElement('option');
            option.value = type;
            option.textContent = type.charAt(0).toUpperCase() + type.slice(1) + ' Decoration';
            typeDropdown.appendChild(option);
        });
        typeDropdown.style.display = 'block';
    } else {
        typeDropdown.style.display = 'none';
    }
});

// Type change
typeDropdown.addEventListener('change', () => {
    const category = categoryDropdown.value;
    const subcategory = subcategoryDropdown.value;
    const type = typeDropdown.value;
    gallery.innerHTML = '';
    if (type && eventData[category][subcategory][type]) {
        eventData[category][subcategory][type].forEach((item, index) => {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'gallery-item';
            itemDiv.innerHTML = `
                <img src="${item.src}" alt="Decor ${index + 1}">
                <p><strong>Description:</strong> ${item.description}</p>
                <p><strong>Price:</strong> ₹${item.price}</p>
                <button class="add-to-cart" data-category="${category}" data-subcategory="${subcategory}" data-type="${type}" data-index="${index}">Add to Cart</button>
            `;
            gallery.appendChild(itemDiv);
        });
    }
});

// Add to Cart functionality (saves to shared localStorage with visual feedback)
gallery.addEventListener('click', (e) => {
    if (e.target.classList.contains('add-to-cart')) {
        const category = e.target.dataset.category;
        const subcategory = e.target.dataset.subcategory;
        const type = e.target.dataset.type;
        const index = e.target.dataset.index;
        const item = eventData[category][subcategory][type][index];
        addToCart(item, e.target);
    }
});

// Footer tab handling
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
    });
});

// Updated addToCart for decoration (saves event, course, type)
function addToCart(item, button) {
    let cart = JSON.parse(localStorage.getItem('eventCart')) || [];
    cart.push({ 
        name: item.description, 
        price: item.price, 
        quantity: 1, 
        category: 'decoration', 
        img: item.src,  // Assuming 'src' is the image
        event: item.event || 'General',  // Add event (from eventData)
        course: 'Decoration',  // Decoration doesn't have course/type, so set to 'Decoration'
        type: 'Decoration'
    });
    localStorage.setItem('eventCart', JSON.stringify(cart));
    // Visual feedback (keep existing)
    const originalText = button.textContent;
    button.textContent = 'Added!';
    button.style.backgroundColor = '#d4af37';
    button.style.color = 'white';
    setTimeout(() => {
        button.textContent = originalText;
        button.style.backgroundColor = '#ffd700';
        button.style.color = '#333';
    }, 2000);
}
